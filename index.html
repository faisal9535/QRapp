<!DOCTYPE html>

      <button class="submit-btn" onclick="submitData()">
        ✅ Submit To Server
      </button>

    </div>

  </div>

  <script>
    let currentField = "";
    let scanner;

    const productionData = {
      worker: "",
      machine: "",
      tool: "",
      material: ""
    };

    function startScanner(field) {
      currentField = field;

      document.getElementById("reader").innerHTML = "";

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: 250
        },
        (decodedText) => {
          productionData[field] = decodedText;

          document.getElementById(field + "-result").innerText = decodedText;

          scanner.stop();

          document.getElementById("reader").innerHTML = "";
        },
        (errorMessage) => {
          console.log(errorMessage);
        }
      );
    }

    function submitData() {
      console.log("Submitted Data:", productionData);

      fetch("https://example.com/api/save-production", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(productionData)
      })
      .then(() => {
        alert("Production Data Submitted Successfully!");
      })
      .catch(() => {
        alert("Server not connected. Demo mode active.");
      });
    }
  </script>

</body>
</html>
